<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Simülasyonu</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <div id="ui-panel">
        <button id="toggle-panel">◀</button>
        
        <div id="panel-content">
            <h2>🛡️ Aegis Control Panel</h2>
            
            <div class="input-group">
                <h3>Add Radar & Battery</h3>
                <label>Union Name: <input type="text" id="new-bat-name" value="Aegis-Antalya"></label>
                <label style="clear: both;">Enlem: <input type="number" id="new-bat-lat" value="36.884" step="0.001"></label>
                <label>Boylam: <input type="number" id="new-bat-lon" value="30.705" step="0.001"></label>
                <button id="add-bat-btn" class="secondary-btn">Add Battery</button>

                <div id="battery-list"></div>
            </div>

            <div class="input-group">
                <h3>Target & Launch</h3>
                <label>Target Latitude: <input type="number" id="def-lat" value="39.925" step="0.001"></label>
                <label>Target Longitude: <input type="number" id="def-lon" value="32.837" step="0.001"></label>
                <hr style="border: 0.1px solid rgba(255,255,255,0.1); margin: 10px 0;">
                <label>Threat Latitude: <input type="number" id="threat-lat" value="34.000" step="0.001"></label>
                <label>Threat Longitude: <input type="number" id="threat-lon" value="38.000" step="0.001"></label>
            </div>

            <button id="start-btn">Start Attack</button>

            <div id="results" style="display: none;">
                <hr>
                <h3>📊 Tactical Data</h3>
                <p id="entry-info">Border Entry: --:--</p>
                <p id="intercept-info">Intercept Location: --, --</p>
                <p id="status-msg"></p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/app.js"></script>
</body>
</html>
